name: Deploy dashboard

# Builds and deploys the admin dashboard (dashboard/) to its own Cloudflare
# Pages project. Gate it with Cloudflare Access in the dashboard.
#
# The Pages project is auto-created on first run. One-time setup after that:
#   - Set its variables: GITHUB_TOKEN (fine-grained PAT, Contents+Actions write) and
#     GITHUB_REPO=andaloussimo/complaints, then redeploy.
#   - Enable Cloudflare Access on the project's domain.

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Ensure Pages project exists
        run: |
          npx wrangler pages project create complaints-dashboard --production-branch=main \
            || echo "Project already exists — continuing."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=complaints-dashboard --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
