name: Delete site

# Removes a site completely: deletes sites/<slug>/ from the repo (commit to
# main) AND deletes the Cloudflare Pages project. Triggered by the dashboard's
# Delete action or manually from the Actions tab. Irreversible (the content
# stays in git history, but the project + live site are gone).

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Site ID / Cloudflare project name to DELETE (e.g. acme)"
        required: true

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate slug
        run: |
          slug="${{ inputs.slug }}"
          if ! echo "$slug" | grep -Eq '^[a-z0-9][a-z0-9-]*$'; then
            echo "Invalid slug: $slug"; exit 1
          fi
          if [ ! -d "sites/$slug" ]; then
            echo "sites/$slug does not exist"; exit 1
          fi

      - name: Remove sites/${{ inputs.slug }} and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r "sites/${{ inputs.slug }}"
          git commit -m "Delete site: ${{ inputs.slug }}"
          git push origin HEAD:main

      - name: Delete Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project delete "${{ inputs.slug }}" --yes \
            || echo "Cloudflare project not found — nothing to delete."

      - name: Summary
        run: |
          {
            echo "### 🗑️ Site \`${{ inputs.slug }}\` deleted"
            echo ""
            echo "- Removed \`sites/${{ inputs.slug }}/\` from the repo"
            echo "- Deleted the \`${{ inputs.slug }}\` Cloudflare Pages project"
            echo ""
            echo "If a custom domain was attached, its DNS record may need manual cleanup."
          } >> "$GITHUB_STEP_SUMMARY"
