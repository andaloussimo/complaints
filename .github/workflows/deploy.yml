name: Deploy sites to Cloudflare Pages

# Deploys every site under sites/* to its own Cloudflare Pages project.
# Convention: the Pages project name == the site folder name (slug).
# Create each project once before its first deploy (the "New site" workflow
# does this automatically):
#   npx wrangler pages project create <slug> --production-branch=main
# HubSpot credentials are SHARED across sites: set HUBSPOT_TOKEN (and optional
# HUBSPOT_PIPELINE / HUBSPOT_OPERATOR_PROP) once as GitHub repo secrets — this
# workflow syncs them to every site's project on each deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # 1. Discover the list of sites so new folders need no workflow edit.
  discover:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.list.outputs.sites }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        name: List site slugs
        run: |
          # Real sites only — skip folders starting with "_" (e.g. _template).
          slugs=$(ls -1 sites | grep -v '^_' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "sites=$slugs" >> "$GITHUB_OUTPUT"
          echo "Discovered: $slugs"

  # 2. Build + deploy each site in parallel.
  deploy:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.discover.outputs.sites) }}
    concurrency:
      group: deploy-${{ matrix.site }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # SITE is the ONLY per-site build input; content/theme/lang/url all live
      # in sites/${{ matrix.site }}/. prepare-site copies its assets into out/.
      - name: Build ${{ matrix.site }}
        run: npm run build
        env:
          SITE: ${{ matrix.site }}

      # HubSpot config sync. The token is shared (repo secret). The routing
      # settings come from the site's content.json `hubspot` block (managed in
      # the dashboard), falling back to repo-secret defaults; empty on both
      # sides unsets the project var. Runs before the deploy so the new
      # deployment picks the values up.
      - name: Sync HubSpot secrets to ${{ matrix.site }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          DEF_PIPELINE: ${{ secrets.HUBSPOT_PIPELINE }}
          DEF_STAGE: ${{ secrets.HUBSPOT_STAGE }}
          DEF_OWNER: ${{ secrets.HUBSPOT_OWNER }}
          DEF_PRIORITY: ${{ secrets.HUBSPOT_PRIORITY }}
          DEF_ROUTING_PROP: ${{ secrets.HUBSPOT_ROUTING_PROP }}
          DEF_ROUTING_VALUE: ${{ secrets.HUBSPOT_ROUTING_VALUE }}
          DEF_OPERATOR_PROP: ${{ secrets.HUBSPOT_OPERATOR_PROP }}
        run: |
          set -e
          PROJECT="${{ matrix.site }}"
          CONTENT="sites/${{ matrix.site }}/content.json"
          put() { printf '%s' "$2" | npx wrangler pages secret put "$1" --project-name="$PROJECT"; }
          sync() { # $1 = HUBSPOT_* var name, $2 = jq path in content.json, $3 = repo default
            site_val=$(jq -r "$2 // \"\"" "$CONTENT")
            val="${site_val:-$3}"
            if [ -n "$val" ]; then
              put "$1" "$val"
            else
              echo y | npx wrangler pages secret delete "$1" --project-name="$PROJECT" 2>/dev/null || true
            fi
          }
          if [ -n "$HUBSPOT_TOKEN" ]; then put HUBSPOT_TOKEN "$HUBSPOT_TOKEN"; else echo "No HUBSPOT_TOKEN repo secret — skipping sync (form will error until set)."; fi
          sync HUBSPOT_PIPELINE      '.hubspot.pipeline'     "$DEF_PIPELINE"
          sync HUBSPOT_STAGE         '.hubspot.stage'        "$DEF_STAGE"
          sync HUBSPOT_OWNER         '.hubspot.owner'        "$DEF_OWNER"
          sync HUBSPOT_PRIORITY      '.hubspot.priority'     "$DEF_PRIORITY"
          sync HUBSPOT_ROUTING_PROP  '.hubspot.routingProp'  "$DEF_ROUTING_PROP"
          sync HUBSPOT_ROUTING_VALUE '.hubspot.routingValue' "$DEF_ROUTING_VALUE"
          sync HUBSPOT_OPERATOR_PROP '.hubspot.operatorProp' "$DEF_OPERATOR_PROP"

      # Direct upload (no CF build minutes). wrangler auto-bundles ./functions.
      - name: Deploy ${{ matrix.site }}
        run: npx wrangler pages deploy out --project-name="${{ matrix.site }}" --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
